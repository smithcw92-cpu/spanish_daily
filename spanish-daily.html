<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Spanish</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #0d1117;
  color: #c5cde8;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  min-height: 100vh;
  padding: 16px 16px 40px;
}
#header {
  text-align: center;
  padding: 22px 0 20px;
  border-bottom: 1px solid #1e2740;
  margin-bottom: 24px;
}
h1 { font-size: 1.55rem; font-weight: 700; color: #e8ecf4; margin-bottom: 4px; }
#date-display { font-size: 0.83rem; color: #5a6380; margin-bottom: 10px; }
#progress-bar {
  display: flex; justify-content: center; gap: 24px;
  font-size: 0.82rem; color: #7a84a0;
}
#progress-bar span { color: #c5cde8; font-weight: 600; }

section { margin-bottom: 32px; }
.section-title {
  font-size: 0.78rem; font-weight: 700; letter-spacing: 0.08em;
  text-transform: uppercase; color: #5a6380;
  margin-bottom: 12px; padding-bottom: 6px;
  border-bottom: 1px solid #1a2035;
  display: flex; align-items: baseline; gap: 8px;
}
.section-title em { font-style: normal; font-weight: 400; color: #4a5470; letter-spacing: 0; text-transform: none; font-size: 0.9em; }

/* ── Vocab cards ── */
.vocab-card {
  background: #111827;
  border: 1px solid #1e2740;
  border-radius: 8px;
  padding: 11px 13px;
  margin-bottom: 7px;
  display: grid;
  grid-template-columns: 1fr 1fr auto;
  align-items: center;
  gap: 10px;
  transition: border-color 0.2s, background 0.2s;
}
.vocab-card.correct  { border-color: #1e4d2e; background: #0b1c12; }
.vocab-card.revealed { border-color: #1e2d50; background: #0b1020; }

.eng-word { font-size: 0.88rem; color: #c5cde8; }

.ans-input {
  background: #0d1117;
  border: 1px solid #252e48;
  border-radius: 5px;
  color: #c5cde8;
  font-size: 0.88rem;
  padding: 6px 10px;
  outline: none;
  width: 100%;
  transition: border-color 0.15s;
}
.ans-input:focus  { border-color: #4060a0; }
.ans-input.correct { border-color: #2d7048; color: #5ecf88; background: #091812; }
.ans-input.wrong   { border-color: #7a3030; color: #cf7070; }
.ans-input:disabled { opacity: 0.7; cursor: default; }

.see-btn {
  background: #181e30;
  border: 1px solid #252e48;
  border-radius: 5px;
  color: #606880;
  font-size: 0.75rem;
  padding: 5px 10px;
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.15s;
  min-width: 74px;
  text-align: center;
}
.see-btn:hover   { background: #252e48; color: #c5cde8; }
.see-btn.revealed { color: #4caf70; border-color: #1e4d2e; background: #091812; cursor: default; line-height: 1.3; }
.see-btn .conj-es { display: block; font-size: 0.85rem; }
.see-btn .conj-en-gloss { display: block; font-size: 0.68rem; color: #3a7a50; margin-top: 2px; }

/* ── Verb cards ── */
.verb-card {
  background: #111827;
  border: 1px solid #1e2740;
  border-radius: 8px;
  padding: 16px;
  margin-bottom: 16px;
}
.verb-header { margin-bottom: 14px; }
.verb-name   { font-size: 1.05rem; font-weight: 700; color: #e8ecf4; }
.verb-meaning { font-weight: 400; color: #7a84a0; font-size: 0.85rem; }
.verb-tense  { font-size: 0.78rem; color: #5a6890; margin-top: 3px; text-transform: uppercase; letter-spacing: 0.06em; }
.tense-desc {
  margin-top: 10px;
  padding: 10px 12px;
  background: #0d1117;
  border-left: 2px solid #252e48;
  border-radius: 0 5px 5px 0;
  font-size: 0.8rem;
  line-height: 1.55;
  color: #7a84a0;
}
.tense-desc .lang-label {
  font-size: 0.68rem;
  font-weight: 700;
  letter-spacing: 0.07em;
  text-transform: uppercase;
  margin-bottom: 4px;
  color: #4a5470;
}
.tense-desc .desc-text { font-size: 0.8rem; line-height: 1.55; color: #8a94b4; }
.tense-desc .desc-text.es { color: #7a84a0; }
.tense-desc .es-block { border-top: 1px solid #1a2035; padding-top: 8px; margin-top: 10px; }

.conj-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px 16px;
}
.conj-row {
  display: grid;
  grid-template-columns: 80px 1fr auto;
  align-items: center;
  gap: 8px;
}
.pronoun { font-size: 0.8rem; color: #6070a0; font-style: italic; }

.conj-input {
  background: #0d1117;
  border: 1px solid #252e48;
  border-radius: 5px;
  color: #c5cde8;
  font-size: 0.88rem;
  padding: 5px 9px;
  outline: none;
  width: 100%;
  transition: border-color 0.15s;
}
.conj-input:focus   { border-color: #4060a0; }
.conj-input.correct { border-color: #2d7048; color: #5ecf88; background: #091812; }
.conj-input.wrong   { border-color: #7a3030; color: #cf7070; }
.conj-input:disabled { opacity: 0.7; cursor: default; }

/* ── Footer ── */
/* ── Phrase translation ── */
.phrase-card {
  background: #13192a;
  border: 1px solid #1e2740;
  border-radius: 10px;
  padding: 18px 20px;
}
.phrase-english {
  font-size: 1rem;
  color: #d0d8f0;
  line-height: 1.6;
  margin-bottom: 14px;
}
.phrase-textarea {
  width: 100%;
  box-sizing: border-box;
  background: #0d1117;
  border: 1px solid #2a3050;
  border-radius: 6px;
  color: #c5cde8;
  font-size: 0.92rem;
  font-family: inherit;
  line-height: 1.55;
  padding: 10px 12px;
  resize: vertical;
  min-height: 90px;
  outline: none;
  transition: border-color 0.15s;
}
.phrase-textarea:focus { border-color: #4a6090; }
.phrase-actions {
  display: flex;
  gap: 10px;
  margin-top: 10px;
  align-items: center;
}
#phrase-see-btn {
  background: #1e2740;
  border: 1px solid #2a3050;
  border-radius: 6px;
  color: #7a84a0;
  font-size: 0.82rem;
  padding: 7px 16px;
  cursor: pointer;
  transition: all 0.15s;
}
#phrase-see-btn:hover { background: #2a3050; color: #c5cde8; }
#phrase-see-btn.revealed { color: #4caf50; border-color: #2a6040; }
.phrase-hint { font-size: 0.74rem; color: #3a4260; }
.phrase-answer {
  display: none;
  margin-top: 14px;
  padding-top: 14px;
  border-top: 1px solid #1e2740;
}
.phrase-answer-label {
  font-size: 0.7rem;
  font-weight: 700;
  letter-spacing: 0.07em;
  color: #4a5470;
  text-transform: uppercase;
  margin-bottom: 6px;
}
.phrase-answer-text {
  font-size: 0.95rem;
  color: #6fcf8e;
  line-height: 1.6;
}
.phrase-note {
  font-size: 0.76rem;
  color: #5a6480;
  margin-top: 8px;
  font-style: italic;
}

#footer {
  text-align: center;
  margin-top: 28px;
}
#refresh-btn {
  background: #181e30;
  border: 1px solid #252e48;
  border-radius: 6px;
  color: #606880;
  font-size: 0.8rem;
  padding: 8px 18px;
  cursor: pointer;
  transition: all 0.15s;
}
#refresh-btn:hover { background: #252e48; color: #c5cde8; }
.footer-hint { font-size: 0.72rem; color: #3a4260; margin-top: 8px; }

@media (max-width: 520px) {
  .vocab-card { grid-template-columns: 1fr; }
  .conj-grid  { grid-template-columns: 1fr; }
  .conj-row   { grid-template-columns: 70px 1fr auto; }
}
</style>
</head>

  <div class="section-title">Conjugation <em>— press Enter in each box to check</em></div>

</section>

<section>

</section>

<div id="footer">

</div>

// ── Helpers ───────────────────────────────────────────────────────────────────
function shuffle(a) {
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function todayStr() { return new Date().toISOString().slice(0, 10); }

function normalize(s) {
  return s.trim().toLowerCase()
    .replace(/[áà]/g,'a').replace(/[éè]/g,'e')
    .replace(/[íì]/g,'i').replace(/[óò]/g,'o')
    .replace(/[úùü]/g,'u').replace(/ñ/g,'n').replace(/¿/g,'?').replace(/¡/g,'!');
}

function isMatch(typed, answer) {
  // Normalise inverted Spanish punctuation early so ? is accepted in place of ¿ (and vice-versa)
  const prep = s => s.trim().toLowerCase().replace(/¿/g, '?').replace(/¡/g, '!');
  const t = prep(typed);
  const a = prep(answer);
  if (t === a) return true;
  // Expand inline "word/word" patterns (e.g. "el/la camarada" → ["el camarada", "la camarada"])
  function expand(s) {
    const m = s.match(/(\S+)\/(\S+)/);
    if (!m) return [s];
    const pre = s.slice(0, m.index);
    const post = s.slice(m.index + m[0].length);
    return [
      ...expand((pre + m[1] + post).trim()),
      ...expand((pre + m[2] + post).trim()),
    ];
  }
  for (const alt of expand(a)) {
    if (alt === t || normalize(alt) === normalize(t)) return true;
  }
  return false;
}

// ── Daily state ───────────────────────────────────────────────────────────────
const CACHE_KEY     = 'spanish_daily_v2';
const VOCAB_COUNT   = 20;
const VERB_COUNT    = 2;

function buildDay() {
  const vocabItems = shuffle([...VOCAB_POOL]).slice(0, VOCAB_COUNT).map(w => ({
    en: w.en, es: w.es,
    userInput: '', revealed: false, correct: false, missed: false,
  }));

  const verbItems = shuffle([...VERB_POOL]).slice(0, VERB_COUNT).map(v => {
    const tense = v.tenses[Math.floor(Math.random() * v.tenses.length)];
    return {
      inf: v.inf, meaning: v.meaning, tense: tense.t, conj: tense.c, conj_en: tense.en,
      userInput: Array(6).fill(''),
      revealed:  Array(6).fill(false),
      correct:   Array(6).fill(false),
    };
  });

  const phraseItem = (()=> {
    const p = shuffle([...PHRASE_POOL])[0];
    return { en: p.en, es: p.es, note: p.note || '', userInput: '', revealed: false };
  })();

  return { date: todayStr(), vocab: vocabItems, verbs: verbItems, phrase: phraseItem };
}

function loadDay() {
  try {
    const raw = localStorage.getItem(CACHE_KEY);
    if (raw) {
      const saved = JSON.parse(raw);
      if (saved.date === todayStr()) {
        // backfill phrase if saved before that feature existed
        if (!saved.phrase) {
          const p = shuffle([...PHRASE_POOL])[0];
          saved.phrase = { en: p.en, es: p.es, note: p.note || '', userInput: '', revealed: false };
        }
        return saved;
      }
    }
  } catch(_) {}
  return buildDay();
}

function saveDay() {
  try { localStorage.setItem(CACHE_KEY, JSON.stringify(day)); } catch(_) {}
}

// ── Progress ──────────────────────────────────────────────────────────────────
function updateProgress() {
  const vDone = day.vocab.filter(w => w.correct).length;
  const cDone = day.verbs.reduce((n, v) => n + v.correct.filter(Boolean).length, 0);
  const cTotal = day.verbs.reduce((n, v) => n + v.conj.length, 0);
  document.getElementById('vocab-prog').textContent = `${vDone} / ${day.vocab.length}`;
  document.getElementById('conj-prog').textContent  = `${cDone} / ${cTotal}`;
}

// ── Vocab rendering ───────────────────────────────────────────────────────────
function getAllInputs() {
  return [...document.querySelectorAll('.ans-input, .conj-input')].filter(el => !el.disabled);
}

function showConjRevealed(btn, es, en) {
  btn.classList.add('revealed');
  btn.innerHTML = `<span class="conj-es">${es}</span><span class="conj-en-gloss">${en}</span>`;
}

function focusNext(currentEl) {
  const all = [...document.querySelectorAll('.ans-input, .conj-input')];
  const idx = all.indexOf(currentEl);
  for (let i = idx + 1; i < all.length; i++) {
    if (!all[i].disabled) {
      all[i].focus();
      all[i].scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      return;
    }
  }
}

function renderVocab() {
  const container = document.getElementById('vocab-list');
  container.innerHTML = '';

  day.vocab.forEach((item, i) => {
    const card = document.createElement('div');
    card.className = 'vocab-card' + (item.correct ? ' correct' : item.revealed ? ' revealed' : '');

    const eng = document.createElement('div');
    eng.className = 'eng-word';
    eng.textContent = item.en;

    const inp = document.createElement('input');
    inp.className = 'ans-input' + (item.correct ? ' correct' : '');
    inp.type = 'text';
    inp.placeholder = 'Spanish…';
    inp.value = item.userInput || '';
    inp.autocomplete = 'off';
    inp.spellcheck = false;
    inp.setAttribute('data-vi', i);
    if (item.correct) inp.disabled = true;

    const seeBtn = document.createElement('button');
    seeBtn.className = 'see-btn' + (item.revealed || item.correct ? ' revealed' : '');
    seeBtn.textContent = (item.revealed || item.correct) ? item.es : 'See Answer';

    inp.addEventListener('input', () => { item.userInput = inp.value; saveDay(); });

    inp.addEventListener('keydown', e => {
      if (e.key !== 'Enter') return;
      e.preventDefault();
      if (item.correct) { focusNext(inp); return; }
      if (isMatch(inp.value, item.es)) {
        item.correct = true;
        item.missed  = false;
        item.userInput = inp.value;
        inp.classList.remove('wrong'); inp.classList.add('correct');
        inp.disabled = true;
        card.classList.remove('revealed'); card.classList.add('correct');
        seeBtn.textContent = item.es; seeBtn.classList.add('revealed');
        updateProgress(); saveDay();
        focusNext(inp);
      } else {
        item.missed = true;
        inp.classList.add('wrong');
        setTimeout(() => inp.classList.remove('wrong'), 700);
      }
    });

    seeBtn.addEventListener('click', () => {
      if (item.correct) return;
      item.revealed = true;
      item.missed   = true;
      seeBtn.textContent = item.es;
      seeBtn.classList.add('revealed');
      card.classList.add('revealed');
      saveDay();
    });

    card.append(eng, inp, seeBtn);
    container.appendChild(card);
  });
}

// ── Verb rendering ────────────────────────────────────────────────────────────
function renderVerbs() {
  const container = document.getElementById('verb-list');
  container.innerHTML = '';

  day.verbs.forEach((verb, vi) => {
    const card = document.createElement('div');
    card.className = 'verb-card';

    const hdr = document.createElement('div');
    hdr.className = 'verb-header';
    const info = TENSE_INFO[verb.tense] || {};
    hdr.innerHTML =
      `<div class="verb-name">${verb.inf} <span class="verb-meaning">— ${verb.meaning}</span></div>` +
      `<div class="verb-tense">${verb.tense}</div>` +
      (info.en ? `<div class="tense-desc">
        <div class="lang-label">🇺🇸 English</div>
        <div class="desc-text">${info.en}</div>
        <div class="es-block">
          <div class="lang-label">🇪🇸 Español</div>
          <div class="desc-text es">${info.es}</div>
        </div>
      </div>` : '');
    card.appendChild(hdr);

    const grid = document.createElement('div');
    grid.className = 'conj-grid';

    PRONOUNS.forEach((pronoun, pi) => {
      const row = document.createElement('div');
      row.className = 'conj-row';

      const pron = document.createElement('div');
      pron.className = 'pronoun';
      pron.textContent = pronoun;

      const inp = document.createElement('input');
      inp.className = 'conj-input' + (verb.correct[pi] ? ' correct' : '');
      inp.type = 'text';
      inp.placeholder = '…';
      inp.value = verb.userInput[pi] || '';
      inp.autocomplete = 'off';
      inp.spellcheck = false;
      if (verb.correct[pi]) inp.disabled = true;

      const seeBtn = document.createElement('button');
      seeBtn.className = 'see-btn' + (verb.revealed[pi] || verb.correct[pi] ? ' revealed' : '');
      if (verb.revealed[pi] || verb.correct[pi]) {
        showConjRevealed(seeBtn, verb.conj[pi], verb.conj_en?.[pi] ?? '');
      } else {
        seeBtn.textContent = 'See';
      }

      inp.addEventListener('input', () => { verb.userInput[pi] = inp.value; saveDay(); });

      inp.addEventListener('keydown', e => {
        if (e.key !== 'Enter') return;
        e.preventDefault();
        if (verb.correct[pi]) { focusNext(inp); return; }
        if (isMatch(inp.value, verb.conj[pi])) {
          verb.correct[pi] = true;
          verb.userInput[pi] = inp.value;
          inp.classList.remove('wrong'); inp.classList.add('correct');
          inp.disabled = true;
          showConjRevealed(seeBtn, verb.conj[pi], verb.conj_en?.[pi] ?? '');
          updateProgress(); saveDay();
          focusNext(inp);
        } else {
          inp.classList.add('wrong');
          setTimeout(() => inp.classList.remove('wrong'), 700);
        }
      });

      seeBtn.addEventListener('click', () => {
        if (verb.correct[pi]) return;
        verb.revealed[pi] = true;
        showConjRevealed(seeBtn, verb.conj[pi], verb.conj_en?.[pi] ?? '');
        saveDay();
      });

      row.append(pron, inp, seeBtn);
      grid.appendChild(row);
    });

    card.appendChild(grid);
    container.appendChild(card);
  });
}

function renderPhrase() {
  const container = document.getElementById('phrase-section');
  const item = day.phrase;
  if (!item) return;

  const card = document.createElement('div');
  card.className = 'phrase-card';

  const engDiv = document.createElement('div');
  engDiv.className = 'phrase-english';
  engDiv.textContent = item.en;

  const textarea = document.createElement('textarea');
  textarea.className = 'phrase-textarea';
  textarea.placeholder = 'Write your Spanish translation here…';
  textarea.value = item.userInput || '';
  textarea.spellcheck = false;
  textarea.addEventListener('input', () => {
    item.userInput = textarea.value;
    saveDay();
  });

  const actions = document.createElement('div');
  actions.className = 'phrase-actions';

  const seeBtn = document.createElement('button');
  seeBtn.id = 'phrase-see-btn';
  seeBtn.textContent = item.revealed ? 'Answer shown ↓' : 'See Translation';
  if (item.revealed) seeBtn.classList.add('revealed');

  const hint = document.createElement('div');
  hint.className = 'phrase-hint';
  hint.textContent = 'Write your translation first, then reveal to compare';
  if (item.revealed) hint.textContent = '';

  actions.append(seeBtn, hint);

  const answerDiv = document.createElement('div');
  answerDiv.className = 'phrase-answer';
  if (item.revealed) answerDiv.style.display = 'block';

  const ansLabel = document.createElement('div');
  ansLabel.className = 'phrase-answer-label';
  ansLabel.textContent = '🇪🇸 Reference translation';

  const ansText = document.createElement('div');
  ansText.className = 'phrase-answer-text';
  ansText.textContent = item.es;

  const noteDiv = document.createElement('div');
  noteDiv.className = 'phrase-note';
  noteDiv.textContent = item.note ? '📌 ' + item.note : '';

  answerDiv.append(ansLabel, ansText, noteDiv);

  seeBtn.addEventListener('click', () => {
    item.revealed = true;
    answerDiv.style.display = 'block';
    seeBtn.textContent = 'Answer shown ↓';
    seeBtn.classList.add('revealed');
    hint.textContent = '';
    saveDay();
  });

  card.append(engDiv, textarea, actions, answerDiv);
  container.innerHTML = '';
  container.appendChild(card);
}

function render() {
  renderVocab();
  renderVerbs();
  renderPhrase();
  updateProgress();
}

function init() {
  day = loadDay();
  saveDay(); // persist if freshly built

  document.getElementById('date-display').textContent =
    new Date().toLocaleDateString('en-US', { weekday:'long', year:'numeric', month:'long', day:'numeric' });

  render();

  document.getElementById('vocab-reset-missed-btn').addEventListener('click', () => {
    const missed = day.vocab.filter(w => w.missed || w.revealed);
    if (!missed.length) return;
    missed.forEach(w => { w.userInput = ''; w.revealed = false; w.correct = false; w.missed = false; });
    saveDay();
    renderVocab();
    updateProgress();
  });

  document.getElementById('vocab-reset-btn').addEventListener('click', () => {
    day.vocab.forEach(w => { w.userInput = ''; w.revealed = false; w.correct = false; w.missed = false; });
    saveDay();
    renderVocab();
    updateProgress();
  });

  document.getElementById('refresh-btn').addEventListener('click', () => {
    if (confirm('Replace today\'s words with a new random set?')) {
      day = buildDay();
      saveDay();
      render();
    }
  });
}
